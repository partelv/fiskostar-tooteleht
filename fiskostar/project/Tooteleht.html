<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fiskostar · ROBOCINQUE — Tooteleht</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Signika:wght@300;400;500;600;700&display=swap">

  <style>
    html, body { margin: 0; padding: 0; background: #efece6; min-height: 100vh; font-family: 'Signika', system-ui, sans-serif; color: #0a0a0a; }
    * { box-sizing: border-box; }
    body {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 16px 64px;
    }
    .pp-header {
      width: 100%; max-width: 800px;
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 30px;
    }
    .pp-brand {
      font-size: 14px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    }
    .pp-sub {
      font-size: 12px; color: #888; letter-spacing: 0.04em;
    }
    .pp-frame {
      transform-origin: top center;
    }
    /* Scale down on smaller viewports */
    @media (max-height: 950px) {
      body { padding-top: 24px; padding-bottom: 24px; }
      .pp-frame { transform: scale(0.92); }
    }
    @media (max-height: 880px) {
      .pp-frame { transform: scale(0.85); }
    }
    @media (max-width: 440px) {
      body { padding: 0; background: #0a0a0a; }
      .pp-header { display: none; }
      .pp-frame { transform: none; }
    }

    /* image-slot placeholder styling (faint, doesn't dominate the dark hero) */
    image-slot::part(placeholder) {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>
</head>
<body>
  <div class="pp-header">
    <div class="pp-brand">Fiskostar</div>
    <div class="pp-sub">ROBOCINQUE · mobiili tooteleht · iPhone 15 viewport</div>
  </div>

  <div id="root" class="pp-frame" data-screen-label="01 Tooteleht ROBOCINQUE"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="product-data.jsx"></script>
  <script type="text/babel" src="tooteleht.jsx?v=3"></script>

  <script type="text/babel" data-presets="react">
    (function() {
      const { Tooteleht, TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect } = window;

      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "density": "compact",
        "defaultFinish": "me"
      }/*EDITMODE-END*/;

      function App() {
        const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

        return (
          <React.Fragment>
            <Tooteleht density={t.density} defaultFinish={t.defaultFinish} key={t.defaultFinish}/>

            <TweaksPanel title="Tweaks">
              <TweakSection title="Vaade">
                <TweakRadio
                  label="Vaate tihedus"
                  value={t.density}
                  options={[
                    { value: 'compact', label: 'Compact' },
                    { value: 'airy', label: 'Airy' },
                  ]}
                  onChange={(v) => setTweak('density', v)}
                />
                <TweakSelect
                  label="Avamise viimistlus"
                  value={t.defaultFinish}
                  options={[
                    { value: 'me',  label: 'Läikiv messing' },
                    { value: 'cr',  label: 'Läikiv kroom' },
                    { value: 'hcr', label: 'Matt kroom' },
                    { value: 'mu',  label: 'Matt must' },
                    { value: 'va',  label: 'Matt valge' },
                  ]}
                  onChange={(v) => setTweak('defaultFinish', v)}
                />
              </TweakSection>
            </TweaksPanel>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    })();
  </script>
</body>
</html>
